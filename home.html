<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea Olvera — Finance × Technology × Curiosity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #070d1a;
    --accent:  #4fc3f7;
    --text:    #e8f0f8;
    --text2:   #6b8caa;
    --text3:   #2a3f5a;
    --border:  rgba(79,195,247,0.15);
    --mono:    'Space Mono', monospace;
    --sans:    'Open Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 4rem; background: rgba(7,13,26,0.85); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); }
  .nav-logo { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 0.1em; text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-family: var(--mono); font-size: 12px; color: var(--text2); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }
  #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .hero { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .hero-name { font-family: var(--mono); font-size: clamp(2.8rem, 8vw, 6rem); font-weight: 700; color: var(--text); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 1.2rem; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
  .hero-name span { color: var(--accent); }
  .hero-tagline { font-family: var(--mono); font-size: clamp(0.85rem, 2vw, 1.05rem); color: var(--text2); letter-spacing: 0.12em; margin-bottom: 3rem; opacity: 0; animation: fadeUp 0.8s ease 0.55s forwards; }
  .hero-tagline span { color: var(--accent); opacity: 0.7; margin: 0 0.5rem; }
  .hero-buttons { display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
  .btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.85rem 2rem; border-radius: 4px; text-decoration: none; transition: all 0.25s ease; cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: var(--bg); font-weight: 700; }
  .btn-primary:hover { background: #81d4fa; transform: translateY(-2px); }
  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  .btn-secondary:hover { background: rgba(79,195,247,0.08); border-color: var(--accent); transform: translateY(-2px); }
  .hero-scroll { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }
  .hero-scroll span { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; }
  .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--accent), transparent); animation: scrollPulse 2s ease infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes scrollPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } .nav-links { gap: 1rem; } .nav-links a { font-size: 10px; } }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<section class="hero" id="home">
  <h1 class="hero-name">Andrea <span>Olvera</span></h1>
  <p class="hero-tagline">Finance <span>×</span> Technology <span>×</span> Curiosity</p>
  <div class="hero-buttons">
    <a href="#" onclick="window.parent.scrollToId('projects-frame');return false;" class="btn btn-primary">View My Work</a>
    <a href="#" onclick="window.parent.scrollToId('contact-frame');return false;" class="btn btn-secondary">Get In Touch</a>
  </div>
  <div class="hero-scroll">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>
<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize',()=>{ resize(); initParticles(); });

// Warm coral color for formulas
const C='rgba(255,255,255,';
const SIMPLE=['∑','Δ','π','σ','β','ρ'];

function drawErt(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  ctx.font=`${s}px Space Mono,monospace`;
  ctx.fillText('e',x,y);
  const ew=ctx.measureText('e').width;
  ctx.font=`${s*0.58}px Space Mono,monospace`;
  ctx.fillText('rt',x+ew,y-s*0.38);
  ctx.restore();
}

function drawGordon(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.82;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('P',x,y);
  const pw=ctx.measureText('P').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('0',x+pw,y+fs*0.28);
  const sw=ctx.measureText('0').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  const eq=' =';
  ctx.fillText(eq,x+pw+sw*0.7,y);
  const eqw=ctx.measureText(eq).width;
  const nx=x+pw+sw*0.7+eqw+fs*0.2;
  ctx.font=`${fs*0.78}px Space Mono,monospace`;
  ctx.fillText('D₁',nx,y-fs*0.12);
  const dw=ctx.measureText('D₁').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.1,dw,1);
  ctx.fillText('r−g',nx,y+fs*0.9);
  ctx.restore();
}

function drawNPV(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.88;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('NPV = ∑',x,y);
  const lw=ctx.measureText('NPV = ∑').width;
  const nx=x+lw+fs*0.15;
  ctx.font=`${fs*0.72}px Space Mono,monospace`;
  ctx.fillText('CFt',nx,y-fs*0.1);
  const fw=ctx.measureText('CFt').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.12,fw,1);
  ctx.fillText('(1+r)t',nx,y+fs*0.88);
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' − C₀',nx+fw*0.5,y);
  ctx.restore();
}

function drawCAPM(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.78;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('E(R',x,y);
  const e1=ctx.measureText('E(R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('i',x+e1,y+fs*0.24);
  const iw=ctx.measureText('i').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(') = R',x+e1+iw*0.7,y);
  const r1=ctx.measureText(') = R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('f',x+e1+iw*0.7+r1,y+fs*0.24);
  const fw=ctx.measureText('f').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' + β(R',x+e1+iw*0.7+r1+fw*0.7,y);
  const b1=ctx.measureText(' + β(R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('m',x+e1+iw*0.7+r1+fw*0.7+b1,y+fs*0.24);
  const mw=ctx.measureText('m').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' − R',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7,y);
  const r2=ctx.measureText(' − R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('f',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7+r2,y+fs*0.24);
  const fw2=ctx.measureText('f').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(')',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7+r2+fw2*0.7,y);
  ctx.restore();
}

function drawSharpe(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.82;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('S =',x,y);
  const lw=ctx.measureText('S =').width;
  const nx=x+lw+fs*0.2;
  ctx.font=`${fs*0.75}px Space Mono,monospace`;
  ctx.fillText('Rp−Rf',nx,y-fs*0.1);
  const nw=ctx.measureText('Rp−Rf').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.1,nw,1);
  ctx.fillText('σp',nx+nw*0.2,y+fs*0.88);
  ctx.restore();
}

function drawFV(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.88;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('FV = PV',x,y);
  const lw=ctx.measureText('FV = PV').width;
  ctx.fillText(' x (1+r)',x+lw,y);
  const lw2=ctx.measureText(' x (1+r)').width;
  ctx.font=`${fs*0.58}px Space Mono,monospace`;
  ctx.fillText('n',x+lw+lw2,y-fs*0.38);
  ctx.restore();
}
function drawSimple(x,y,s,a,sym){
  ctx.save(); ctx.fillStyle=C+a+')';
  ctx.font=`${s}px Space Mono,monospace`;
  ctx.fillText(sym,x,y);
  ctx.restore();
}

let particles=[];

function initParticles(){
  particles=[];
  const total=Math.floor((canvas.width*canvas.height)/18000);
  let npvC=0,capmC=0,gordonC=0,sharpeC=0,fvC=0;
  for(let i=0;i<total;i++){
    const r=Math.random();
    let type;
    if(r<0.16) type='ert';
    else if(r<0.28 && gordonC<3){ type='gordon'; gordonC++; }
    else if(r<0.40 && npvC<3){ type='npv'; npvC++; }
    else if(r<0.52 && capmC<3){ type='capm'; capmC++; }
    else if(r<0.64 && sharpeC<3){ type='sharpe'; sharpeC++; }
    else if(r<0.74 && fvC<3){ type='fv'; fvC++; }
    else type='simple';
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      type,
      sym:SIMPLE[Math.floor(Math.random()*SIMPLE.length)],
      s:Math.random()*4+13,
      op:Math.random()*0.10+0.18,
      vx:(Math.random()-0.5)*0.14,
      vy:(Math.random()-0.5)*0.14,
      ph:Math.random()*Math.PI*2
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of particles){
    p.ph+=0.007;
    const a=(p.op+Math.sin(p.ph)*0.02).toFixed(3);
    if(p.type==='ert') drawErt(p.x,p.y,p.s,a);
    else if(p.type==='gordon') drawGordon(p.x,p.y,p.s,a);
    else if(p.type==='npv') drawNPV(p.x,p.y,p.s,a);
    else if(p.type==='capm') drawCAPM(p.x,p.y,p.s,a);
    else if(p.type==='sharpe') drawSharpe(p.x,p.y,p.s,a);
    else if(p.type==='fv') drawFV(p.x,p.y,p.s,a);
    else drawSimple(p.x,p.y,p.s,a,p.sym);
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-220) p.x=canvas.width+70;
    if(p.x>canvas.width+220) p.x=-70;
    if(p.y<-60) p.y=canvas.height+30;
    if(p.y>canvas.height+60) p.y=-30;
  }
  requestAnimationFrame(animate);
}
initParticles();
animate();
</script>
</body>
</html>
