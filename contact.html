<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Andrea Olvera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#070d1a; --bg2:#0b1428; --bg3:#0f1c38;
    --accent:#4fc3f7; --text:#e8f0f8; --text2:#6b8caa;
    --border:rgba(255,255,255,0.15); --border2:rgba(255,255,255,0.08);
    --mono:'Space Mono',monospace; --sans:'Open Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

  .contact-section{position:relative;z-index:1;padding:5rem 2rem 5rem;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}

  .section-label{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:3.5rem;display:flex;align-items:center;gap:12px;width:100%;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .form-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:2.5rem 2.5rem;width:100%;max-width:560px;}
  .form-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);margin-bottom:0.5rem;}
  .form-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;line-height:1.65;}
  .form-group{margin-bottom:1.2rem;}
  .form-group label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;display:block;margin-bottom:6px;}
  .form-group input,.form-group textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:var(--sans);font-size:14px;transition:border-color 0.2s;outline:none;resize:none;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
  .form-group textarea{height:110px;}
  .send-btn{width:100%;font-family:var(--mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:0.9rem;border-radius:6px;border:none;background:var(--accent);color:var(--bg);font-weight:700;cursor:pointer;transition:all 0.25s;margin-top:0.4rem;}
  .send-btn:hover{background:#81d4fa;transform:translateY(-2px);}

  .linkedin-wrap{margin-top:2.5rem;display:flex;justify-content:center;}
  .linkedin-btn{display:flex;align-items:center;gap:10px;text-decoration:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:0.9rem 1.8rem;transition:all 0.25s;color:var(--text);}
  .linkedin-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
  .linkedin-icon{width:28px;height:28px;background:#0A66C2;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .linkedin-icon svg{width:16px;height:16px;fill:#fff;}
  .linkedin-label{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:0.08em;}
  .linkedin-val{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:700;}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<section class="contact-section" id="contact">
  <div class="section-label">Contact</div>

  <form class="form-wrap" action="https://formspree.io/f/mojkrgrj" method="POST">
    <div class="form-title">Get In Touch</div>
    <p class="form-sub">I'm open to new opportunities, collaborations, and conversations.</p>
    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea name="message"></textarea>
    </div>
    <button type="submit" class="send-btn">Send Message</button>
  </form>

  <div class="linkedin-wrap">
    <a href="https://www.linkedin.com/in/andreaolvera-finance/" target="_blank" class="linkedin-btn">
      <div class="linkedin-icon">
        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </div>
      <div>
        <div class="linkedin-label">Connect on</div>
        <div class="linkedin-val">LinkedIn</div>
      </div>
    </a>
  </div>

</section>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize',()=>{ resize(); initParticles(); });

const C='rgba(255,255,255,';
const SIMPLE=['∑','Δ','π','σ','β','ρ'];

function drawErt(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  ctx.font=`${s}px Space Mono,monospace`;
  ctx.fillText('e',x,y);
  const ew=ctx.measureText('e').width;
  ctx.font=`${s*0.58}px Space Mono,monospace`;
  ctx.fillText('rt',x+ew,y-s*0.38);
  ctx.restore();
}
function drawGordon(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.82;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('P',x,y);
  const pw=ctx.measureText('P').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('0',x+pw,y+fs*0.28);
  const sw=ctx.measureText('0').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' =',x+pw+sw*0.7,y);
  const eqw=ctx.measureText(' =').width;
  const nx=x+pw+sw*0.7+eqw+fs*0.2;
  ctx.font=`${fs*0.78}px Space Mono,monospace`;
  ctx.fillText('D₁',nx,y-fs*0.12);
  const dw=ctx.measureText('D₁').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.1,dw,1);
  ctx.fillText('r−g',nx,y+fs*0.9);
  ctx.restore();
}
function drawNPV(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.88;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('NPV = ∑',x,y);
  const lw=ctx.measureText('NPV = ∑').width;
  const nx=x+lw+fs*0.15;
  ctx.font=`${fs*0.72}px Space Mono,monospace`;
  ctx.fillText('CFt',nx,y-fs*0.1);
  const fw=ctx.measureText('CFt').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.12,fw,1);
  ctx.fillText('(1+r)t',nx,y+fs*0.88);
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' − C₀',nx+fw*0.5,y);
  ctx.restore();
}
function drawCAPM(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.78;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('E(R',x,y);
  const e1=ctx.measureText('E(R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('i',x+e1,y+fs*0.24);
  const iw=ctx.measureText('i').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(') = R',x+e1+iw*0.7,y);
  const r1=ctx.measureText(') = R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('f',x+e1+iw*0.7+r1,y+fs*0.24);
  const fw=ctx.measureText('f').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' + β(R',x+e1+iw*0.7+r1+fw*0.7,y);
  const b1=ctx.measureText(' + β(R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('m',x+e1+iw*0.7+r1+fw*0.7+b1,y+fs*0.24);
  const mw=ctx.measureText('m').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(' − R',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7,y);
  const r2=ctx.measureText(' − R').width;
  ctx.font=`${fs*0.55}px Space Mono,monospace`;
  ctx.fillText('f',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7+r2,y+fs*0.24);
  const fw2=ctx.measureText('f').width;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText(')',x+e1+iw*0.7+r1+fw*0.7+b1+mw*0.7+r2+fw2*0.7,y);
  ctx.restore();
}
function drawSharpe(x,y,s,a){
  ctx.save(); ctx.fillStyle=C+a+')';
  const fs=s*0.95;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('S =',x,y);
  const lw=ctx.measureText('S =').width;
  const nx=x+lw+fs*0.2;
  ctx.font=`${fs*0.75}px Space Mono,monospace`;
  ctx.fillText('Rp−Rf',nx,y-fs*0.1);
  const nw=ctx.measureText('Rp−Rf').width+fs*0.3;
  ctx.fillRect(nx-fs*0.1,y+fs*0.1,nw,1);
  ctx.fillText('σp',nx+nw*0.2,y+fs*0.88);
  ctx.restore();
}
function drawFV(x,y,s,a){
  ctx.save(); ctx.fillStyle='rgba(255,255,255,'+a+')';
  const fs=s*0.88;
  ctx.font=`${fs}px Space Mono,monospace`;
  ctx.fillText('FV = PV',x,y);
  const lw=ctx.measureText('FV = PV').width;
  ctx.fillText(' x (1+r)',x+lw,y);
  const lw2=ctx.measureText(' x (1+r)').width;
  ctx.font=`${fs*0.58}px Space Mono,monospace`;
  ctx.fillText('n',x+lw+lw2,y-fs*0.38);
  ctx.restore();
}
function drawSimple(x,y,s,a,sym){
  ctx.save(); ctx.fillStyle=C+a+')';
  ctx.font=`${s}px Space Mono,monospace`;
  ctx.fillText(sym,x,y);
  ctx.restore();
}

let particles=[];
function initParticles(){
  particles=[];
  const total=Math.floor((canvas.width*canvas.height)/18000);
  let npvC=0,capmC=0,gordonC=0,sharpeC=0,fvC=0;
  for(let i=0;i<total;i++){
    const r=Math.random();
    let type;
    if(r<0.16) type='ert';
    else if(r<0.28&&gordonC<3){type='gordon';gordonC++;}
    else if(r<0.40&&npvC<3){type='npv';npvC++;}
    else if(r<0.52&&capmC<3){type='capm';capmC++;}
    else if(r<0.64&&sharpeC<3){type='sharpe';sharpeC++;}
    else if(r<0.74&&fvC<3){type='fv';fvC++;}
    else type='simple';
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,type,sym:SIMPLE[Math.floor(Math.random()*SIMPLE.length)],s:Math.random()*4+13,op:Math.random()*0.10+0.18,vx:(Math.random()-0.5)*0.14,vy:(Math.random()-0.5)*0.14,ph:Math.random()*Math.PI*2});
  }
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of particles){
    p.ph+=0.007;
    const a=(p.op+Math.sin(p.ph)*0.02).toFixed(3);
    if(p.type==='ert') drawErt(p.x,p.y,p.s,a);
    else if(p.type==='gordon') drawGordon(p.x,p.y,p.s,a);
    else if(p.type==='npv') drawNPV(p.x,p.y,p.s,a);
    else if(p.type==='capm') drawCAPM(p.x,p.y,p.s,a);
    else if(p.type==='sharpe') drawSharpe(p.x,p.y,p.s,a);
    else if(p.type==='fv') drawFV(p.x,p.y,p.s,a);
    else drawSimple(p.x,p.y,p.s,a,p.sym);
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-220) p.x=canvas.width+70;
    if(p.x>canvas.width+220) p.x=-70;
    if(p.y<-60) p.y=canvas.height+30;
    if(p.y>canvas.height+60) p.y=-30;
  }
  requestAnimationFrame(animate);
}
initParticles();
animate();
</script>
</body>
</html>
